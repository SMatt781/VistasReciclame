<!DOCTYPE html>
<html class="light h-full" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Registro | Recíclame</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#006c49",
                "primary-container": "#10b981",
                "secondary": "#0f172a",
                "surface": "#f7f9fb",
                "on-surface-variant": "#3c4a42",
                "surface-container-low": "#f2f4f6",
                "surface-container-high": "#e6e8ea",
                "surface-container-lowest": "#ffffff"
              },
              borderRadius: {
                "DEFAULT": "0.75rem",
                "lg": "1.5rem",
                "xl": "2rem",
                "full": "9999px"
              }
            },
          },
        }
    </script>
    
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .brand-font { font-weight: 800; letter-spacing: -0.05em; }
    </style>
</head>

<body class="bg-surface-container-lowest min-h-screen antialiased overflow-x-hidden">
<main class="flex min-h-screen w-full">
    
    <section class="hidden lg:flex lg:w-[35%] relative overflow-hidden flex-col justify-between p-10 bg-secondary text-white">
        <div class="absolute inset-0 z-0">
            <img class="w-full h-full object-cover opacity-50" alt="Bosque" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXcO6OUR9PxZJLCzfFz3IZ_ybQ4-DgKKosfDRPu5Wb48Zq38imshgI8Wk5sUvdBBbBRRn1ylsrPOFzO6POZxYRs9XkJd-n-3DJ7s95r4Wr7LzyVtJxYUrHTA9Vue77rsRPCDq8-2eCDUMZcAR1vd3tLc_SN_ZQEpS2QmQ6hT7sClfGfOKBdaeQ3h7BY8IaX9qwK5HwU8XV5HY3V6HX1EhVdQTq0TDrs7lUeqecPtFfTDlDgN-YYG1EBrE7GHDtkA87WyI2h952W7E"/>
            <div class="absolute inset-0 bg-gradient-to-b from-secondary/40 via-transparent to-secondary/90"></div>
        </div>

        <div class="relative z-10">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-primary-container fill-current" viewBox="0 0 24 24">
                    <path d="M17 17h5l-4 4-4-4h3V9c0-2.21-1.79-4-4-4S9 6.79 9 9h2c0-1.1.9-2 2-2s2 .9 2 2v8h-3l4 4 4-4zM7 7H2l4-4 4 4H7v8c0 2.21 1.79 4 4 4s4-1.79 4-4h-2c0 1.1-.9 2-2 2s-2-.9-2-2V7z"/>
                </svg>
                <span class="text-2xl brand-font">Recíclame</span>
            </div>
        </div>

        <div class="relative z-10">
            <div class="bg-secondary/40 backdrop-blur-md p-6 rounded-xl border border-white/10">
                <p class="text-lg font-medium leading-snug italic mb-4">"La madurez circular no es una meta, es un proceso continuo."</p>
                <div class="flex flex-col">
                    <span class="font-bold text-primary-container uppercase tracking-widest text-[10px]">Mesa de Innovación</span>
                </div>
            </div>
        </div>
    </section>

    <section class="w-full lg:w-[65%] bg-white flex items-center justify-center p-6 md:p-10">
        <div class="w-full max-w-lg">
            
            <header class="mb-6">
                <h1 class="text-3xl font-extrabold text-secondary tracking-tight mb-1">Únete al Repositorio</h1>
                <p class="text-on-surface-variant text-sm">Crea tu cuenta para acceder al contenido exclusivo.</p>
            </header>

            <div class="flex gap-3 mb-8">
                <button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full bg-secondary text-white text-sm font-bold shadow-md">
                    <svg class="w-4 h-4 text-primary-container fill-current" viewBox="0 0 24 24">
                        <path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/>
                    </svg>
                    Socio
                </button>
                <button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full bg-surface-container-low text-secondary text-sm font-semibold hover:bg-surface-container-high">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                    Visualizador
                </button>
            </div>

            <form class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Nombres</label>
                    <input class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" placeholder="Ej. Javier" type="text"/>
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Apellidos</label>
                    <input class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" placeholder="Ej. Mendizábal" type="text"/>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">DNI</label>
                    <input class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" placeholder="8 dígitos" type="text"/>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">RUC</label>
                    <input class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" placeholder="11 dígitos" type="text"/>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Teléfono</label>
                    <input class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" placeholder="+51 987..." type="tel"/>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Correo Corporativo</label>
                    <input class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" placeholder="nombre@empresa.com" type="email"/>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Contraseña</label>
                    <div class="relative">
                        <input class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" placeholder="••••••••" type="password"/>
                        <button type="button" class="absolute right-3 top-2.5 text-slate-400">
                            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>
                        </button>
                    </div>
                    <div class="flex gap-1 mt-1.5">
                        <div class="h-1 flex-1 rounded-full bg-primary-container"></div>
                        <div class="h-1 flex-1 rounded-full bg-primary-container"></div>
                        <div class="h-1 flex-1 rounded-full bg-slate-200"></div>
                        <div class="h-1 flex-1 rounded-full bg-slate-200"></div>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Confirmar Contraseña</label>
                    <div class="relative">
                        <input class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" placeholder="••••••••" type="password"/>
                    </div>
                </div>

                <div class="md:col-span-2 flex items-start gap-2 py-1">
                    <input class="mt-0.5 h-4 w-4 rounded border-0 bg-surface-container-low text-primary-container focus:ring-primary-container" id="terms" type="checkbox"/>
                    <label class="text-[11px] text-on-surface-variant leading-tight" for="terms">
                        Acepto los <a class="text-secondary font-bold underline decoration-primary-container" href="#">Términos</a> y la <a class="text-secondary font-bold underline decoration-primary-container" href="#">Privacidad</a>.
                    </label>
                </div>

                <div class="md:col-span-2 mt-2">
                    <button class="w-full py-3.5 rounded-full bg-secondary text-white text-sm font-bold flex items-center justify-center gap-3 group transition-all hover:bg-slate-800">
                        Solicitar Registro
                        <svg class="w-4 h-4 transition-transform group-hover:translate-x-1 fill-current" viewBox="0 0 24 24">
                            <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
                        </svg>
                    </button>
                </div>
            </form>

            <footer class="mt-8 text-center">
                <p class="text-xs text-on-surface-variant">
                    ¿Ya tienes una cuenta? <a class="text-primary-container font-bold hover:underline" href="#">Inicia sesión</a>
                </p>
            </footer>
        </div>
    </section>
</main>
</body>
</html>
