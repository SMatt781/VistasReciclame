<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Registro | Recíclame</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006c49",
                        "primary-container": "#10b981",
                        "secondary": "#0f172a",
                        "surface": "#f7f9fb",
                        "on-surface-variant": "#3c4a42",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-high": "#e6e8ea",
                        "surface-container-lowest": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    }
                }
            }
        };
    </script>

    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        .brand-font { font-weight: 800; letter-spacing: -0.05em; }
    </style>
</head>

<body class="min-h-screen bg-surface-container-lowest antialiased overflow-x-hidden">
    <main class="flex min-h-screen w-full">
        
        <section class="relative hidden lg:flex lg:w-[35%] flex-col justify-between p-10 bg-secondary text-white overflow-hidden">
            <div class="absolute inset-0 z-0">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(16,185,129,0.2),transparent_30%),linear-gradient(180deg,#0f172a_0%,#0b1220_100%)]"></div>
                <div class="absolute -left-16 top-20 h-72 w-72 rounded-full bg-emerald-500/10 blur-3xl"></div>
                <div class="absolute bottom-0 right-0 h-80 w-80 rounded-full bg-emerald-300/10 blur-3xl"></div>
                <div class="absolute inset-0 bg-gradient-to-b from-secondary/40 via-transparent to-secondary/90"></div>
            </div>

            <div class="relative z-10">
                <div class="flex items-center gap-2">
                    <svg class="w-8 h-8 text-primary-container fill-current" viewBox="0 0 24 24">
                        <path d="M12 3c2.7 0 5.18 1.07 7 2.82M21 12c0 2.7-1.07 5.18-2.82 7M12 21c-2.7 0-5.18-1.07-7-2.82M3 12c0-2.7 1.07-5.18 2.82-7" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span class="text-2xl brand-font">Recíclame</span>
                </div>
            </div>

            <div class="relative z-10">
                <div class="bg-secondary/40 backdrop-blur-md p-6 rounded-xl border border-white/10 shadow-2xl">
                    <p class="text-lg font-medium leading-snug italic mb-4">
                        "La madurez circular no es una meta, es un proceso continuo de diseño consciente."
                    </p>
                    <div class="flex flex-col">
                        <span class="font-bold text-primary-container uppercase tracking-widest text-[10px]">Mesa de Innovación</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="flex w-full lg:w-[65%] items-center justify-center p-6 md:p-10 bg-white overflow-y-auto">
            <div class="w-full max-w-lg">
                
                <header class="mb-6">
                    <h1 class="text-3xl font-extrabold text-secondary tracking-tight mb-1">Únete al Repositorio</h1>
                    <p class="text-on-surface-variant text-sm">Crea tu cuenta para visualizar el contenido exclusivo.</p>
                </header>

                <div class="flex gap-3 mb-8">
                    <button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full bg-surface-container-low text-secondary text-sm font-semibold hover:bg-surface-container-high transition-all">
                        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
                            <path d="M3 20h18M6 20V9l6-4 6 4v11M10 13h4M10 17h4" fill="none" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        Socio
                    </button>
                    <button class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-full bg-secondary text-white text-sm font-bold shadow-md transition-all">
                        <svg class="w-4 h-4 text-primary-container fill-current" viewBox="0 0 24 24">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" />
                        </svg>
                        Visualizador
                    </button>
                </div>

                <form class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-3" onsubmit="return false;">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Nombres</label>
                        <input type="text" placeholder="Ej. Javier" class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" />
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Apellidos</label>
                        <input type="text" placeholder="Ej. Mendizábal" class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" />
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">DNI</label>
                        <input type="text" placeholder="8 dígitos" class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" />
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Teléfono</label>
                        <input type="tel" placeholder="+51 987..." class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" />
                    </div>

                    <div class="space-y-1 md:col-span-2">
                        <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Correo Corporativo</label>
                        <input type="email" placeholder="javier@empresa.com" class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" />
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Contraseña</label>
                        <div class="relative">
                            <input type="password" placeholder="••••••••" class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" />
                            <button type="button" class="absolute right-3 top-2.5 text-slate-400">
                                <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7z"/></svg>
                            </button>
                        </div>
                        <div class="flex gap-1 mt-1.5">
                            <div class="h-1 flex-1 rounded-full bg-primary-container"></div>
                            <div class="h-1 flex-1 rounded-full bg-primary-container"></div>
                            <div class="h-1 flex-1 rounded-full bg-slate-200"></div>
                            <div class="h-1 flex-1 rounded-full bg-slate-200"></div>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-secondary uppercase tracking-wider ml-1">Confirmar Contraseña</label>
                        <input type="password" placeholder="••••••••" class="w-full px-4 py-2.5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-container text-sm" />
                    </div>

                    <div class="md:col-span-2 flex items-start gap-2 py-1">
                        <input id="terms" type="checkbox" class="mt-0.5 h-4 w-4 rounded border-0 bg-surface-container-low text-primary-container focus:ring-primary-container" />
                        <label for="terms" class="text-[11px] text-on-surface-variant leading-tight">
                            Acepto los <a href="#" class="text-secondary font-bold underline decoration-primary-container">Términos</a> y la <a href="#" class="text-secondary font-bold underline decoration-primary-container">Privacidad</a>.
                        </label>
                    </div>

                    <div class="md:col-span-2 mt-2">
                        <button class="w-full py-3.5 rounded-full bg-secondary text-white text-sm font-bold flex items-center justify-center gap-3 group transition-all hover:bg-slate-800">
                            Solicitar Registro
                            <svg class="w-4 h-4 transition-transform group-hover:translate-x-1 fill-current" viewBox="0 0 24 24">
                                <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
                            </svg>
                        </button>
                    </div>
                </form>

                <footer class="mt-8 text-center">
                    <p class="text-xs text-on-surface-variant">
                        ¿Ya tienes una cuenta? <a href="#" class="text-primary-container font-bold hover:underline">Inicia sesión</a>
                    </p>
                </footer>
            </div>
        </section>
    </main>
</body>
</html>
