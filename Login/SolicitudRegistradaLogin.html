<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Solicitud Enviada | Recíclame</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006c49",
                        "primary-container": "#10b981",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#3c4a42",
                        "on-tertiary-fixed": "#131b2e",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#bbcabf"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
                        "body": ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f7f9fb;
            -webkit-font-smoothing: antialiased;
        }
        .bg-shape {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.3;
        }
        @keyframes scale-in {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-success {
            animation: scale-in 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center overflow-x-hidden relative py-4">

    <div class="bg-shape top-[-10%] left-[-5%] w-[400px] h-[400px] rounded-full bg-primary-container"></div>
    <div class="bg-shape bottom-[-10%] right-[-5%] w-[500px] h-[500px] rounded-full bg-[#2170e4]"></div>
    <div class="absolute inset-0 bg-gradient-to-tr from-[#f7f9fb] via-white/40 to-[#f7f9fb] -z-20"></div>

    <header class="mb-6 text-center">
        <div class="flex flex-col items-center gap-1">
            <span class="text-2xl font-extrabold text-on-tertiary-fixed tracking-tight font-headline">
                Recíclame
            </span>
            <div class="h-1 w-6 bg-primary rounded-full"></div>
        </div>
    </header>

    <main class="w-full max-w-[420px] px-6">
        <div class="animate-success bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_20px_40px_-12px_rgba(25,28,30,0.06)] border border-outline-variant/20 text-center">
            
            <div class="mb-6 relative inline-flex">
                <div class="absolute inset-0 bg-primary-container opacity-20 blur-2xl rounded-full scale-150"></div>
                <div class="relative w-16 h-16 bg-primary-container rounded-full flex items-center justify-center text-white">
                    <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
            </div>

            <div class="mb-8">
                <h1 class="text-xl md:text-2xl font-bold text-on-tertiary-fixed mb-3 tracking-tight font-headline leading-tight">
                    ¡Solicitud enviada!
                </h1>
                <p class="text-on-surface-variant leading-relaxed text-xs max-w-[260px] mx-auto font-medium">
                    Tu acceso está siendo revisado. Recibirás un correo de confirmación en menos de 24 horas hábiles.
                </p>
            </div>

            <div class="space-y-6">
                <button class="w-full py-3.5 px-6 bg-[#0f172a] hover:bg-black text-white rounded-full flex items-center justify-center gap-3 transition-all transform active:scale-[0.98] group shadow-lg font-bold text-xs uppercase tracking-widest font-headline">
                    <span>Volver al inicio</span>
                    <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>

                <div class="inline-flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full border border-outline-variant/10">
                    <svg class="w-3.5 h-3.5 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-tight">
                        ¿Dudas? <a href="#" class="text-primary hover:underline ml-1">Contactar soporte</a>
                    </span>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-10 w-full max-w-4xl px-8 pb-8 flex flex-col items-center">
        <div class="text-center space-y-3">
            <p class="text-[9px] font-bold tracking-[0.1em] text-on-surface-variant/60 uppercase font-headline">
                © 2026 THE CIRCULAR EDITORIAL. ALL RIGHTS RESERVED.
            </p>
            <nav class="flex flex-wrap justify-center gap-x-4 gap-y-2">
                <a class="text-[8px] font-bold tracking-[0.1em] text-on-surface-variant/40 hover:text-primary transition-colors uppercase font-headline" href="#">PRIVACIDAD</a>
                <a class="text-[8px] font-bold tracking-[0.1em] text-on-surface-variant/40 hover:text-primary transition-colors uppercase font-headline" href="#">SOPORTE</a>
                <a class="text-[8px] font-bold tracking-[0.1em] text-on-surface-variant/40 hover:text-primary transition-colors uppercase font-headline" href="#">TÉRMINOS</a>
            </nav>
        </div>
    </footer>
</body>
</html>
