            "surface-container-low": "#f2f4f6",

  <style>
    body { font-family: Inter, system-ui, sans-serif; }
    .bg-mesh {
      background-color: #f7f9fb;
      background-image:
        radial-gradient(at 0% 0%, hsla(161,65%,88%,1) 0, transparent 50%),
        radial-gradient(at 50% 0%, hsla(220,53%,92%,1) 0, transparent 50%),
        radial-gradient(at 100% 0%, hsla(161,65%,88%,1) 0, transparent 50%);
    }
  </style>

<body class="overflow-hidden bg-surface text-on-surface font-body">
  <!-- Dashboard difuminado de fondo -->
  <div class="pointer-events-none fixed inset-0 z-0 scale-[1.02] select-none blur-[8px] opacity-40">
    <header class="fixed top-0 z-40 flex h-16 w-full items-center justify-between bg-white/80 px-6 shadow-sm backdrop-blur-xl">
      <div class="flex items-center gap-4">
        <span class="text-xl font-bold tracking-tight text-emerald-600">Recíclame</span>
      </div>
      <div class="flex items-center gap-4">
        <svg class="h-5 w-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h16" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 20a2 2 0 004 0" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <svg class="h-5 w-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 18h.01M9.09 9a3 3 0 115.82 1c0 2-3 3-3 3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="9" stroke-width="1.8"/>
        </svg>
        <div class="h-8 w-8 rounded-full bg-slate-200"></div>
      </div>
    </header>

    <aside class="fixed left-0 top-0 flex h-screen w-72 flex-col border-r border-slate-100 bg-white pb-8 pt-12">
      <div class="mb-12 px-8">
        <h1 class="text-2xl font-extrabold tracking-tighter text-emerald-600">Recíclame</h1>
        <p class="mt-1 text-xs font-bold uppercase tracking-widest text-slate-400">The Conscious Archive</p>
      </div>

      <nav class="flex-1">
        <div class="flex items-center px-8 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">
          <svg class="mr-4 h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Dashboard
        </div>

        <div class="flex items-center border-l-[6px] border-emerald-500 bg-emerald-500/10 px-8 py-4 text-xs font-bold uppercase tracking-wider text-slate-900">
          <svg class="mr-4 h-5 w-5 text-emerald-600" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M17 20a4 4 0 00-8 0M12 12a4 4 0 100-8 4 4 0 000 8M5 20a3 3 0 013-3m8 3a3 3 0 013-3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Gestión de Usuarios
        </div>

        <div class="flex items-center px-8 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">
          <svg class="mr-4 h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Estudios
        </div>

        <div class="flex items-center px-8 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">
          <svg class="mr-4 h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M14 9V5a3 3 0 00-6 0v4M5 9h14l-1 10a2 2 0 01-2 2H8a2 2 0 01-2-2L5 9z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Normativas
        </div>

        <div class="flex items-center px-8 py-4 text-xs font-bold uppercase tracking-wider text-slate-500">
          <svg class="mr-4 h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M10.325 4.317a1 1 0 011.35-.936l.695.278a1 1 0 00.739 0l.695-.278a1 1 0 011.35.936l.057.746a1 1 0 00.528.818l.62.35a1 1 0 01.377 1.36l-.375.648a1 1 0 000 .998l.375.648a1 1 0 01-.377 1.36l-.62.35a1 1 0 00-.528.818l-.057.746a1 1 0 01-1.35.936l-.695-.278a1 1 0 00-.739 0l-.695.278a1 1 0 01-1.35-.936l-.057-.746a1 1 0 00-.528-.818l-.62-.35a1 1 0 01-.377-1.36l.375-.648a1 1 0 000-.998l-.375-.648a1 1 0 01.377-1.36l.62-.35a1 1 0 00.528-.818l.057-.746z" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" stroke-width="1.8"/>
          </svg>
          Configuración
        </div>
      </nav>
    </aside>

    <main class="ml-72 p-10 pt-16">
      <div class="grid grid-cols-12 gap-6">
        <div class="col-span-12 mb-6 h-20 rounded-lg bg-white shadow-sm"></div>
        <div class="col-span-4 h-64 rounded-lg bg-white shadow-sm"></div>
        <div class="col-span-8 h-64 rounded-lg bg-white shadow-sm"></div>
        <div class="col-span-12 h-96 rounded-lg bg-white shadow-sm"></div>
      </div>
    </main>
  </div>

  <!-- Overlay modal -->
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-on-background/40 p-4 backdrop-blur-sm">
    <section class="flex w-full max-w-2xl flex-col overflow-hidden rounded-[2.5rem] bg-surface-container-lowest shadow-2xl">
      <!-- Header -->
      <header class="flex items-start justify-between px-10 pb-6 pt-10">
        <div>
          <p class="mb-1 text-[0.65rem] font-bold tracking-[0.15em] text-primary">DIRECTORIO EDITORIAL</p>
          <h2 class="text-2xl font-extrabold tracking-tight text-on-background">Editar Perfil de Usuario</h2>
        </div>

        <button class="group flex h-10 w-10 items-center justify-center rounded-full transition-colors hover:bg-surface-container" aria-label="Cerrar">
          <svg class="h-5 w-5 text-outline transition-colors group-hover:text-on-background" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M6 6l12 12M18 6L6 18" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </header>

      <!-- Body -->
      <form class="max-h-[716px] space-y-8 overflow-y-auto px-10 py-4">
        <div class="grid grid-cols-2 gap-x-8 gap-y-6">
          <div class="space-y-2">
            <label class="block text-[0.65rem] font-bold uppercase tracking-wider text-outline">Nombres</label>
            <input type="text" value="Carolina" placeholder="Ingrese nombres" class="w-full rounded-xl border-none bg-surface-container-low px-4 py-3 font-medium text-on-background transition-all focus:ring-2 focus:ring-primary/20" />
          </div>

          <div class="space-y-2">
            <label class="block text-[0.65rem] font-bold uppercase tracking-wider text-outline">Apellidos</label>
            <input type="text" value="Mendoza Rivera" placeholder="Ingrese apellidos" class="w-full rounded-xl border-none bg-surface-container-low px-4 py-3 font-medium text-on-background transition-all focus:ring-2 focus:ring-primary/20" />
          </div>

          <div class="space-y-2">
            <label class="block text-[0.65rem] font-bold uppercase tracking-wider text-outline">Teléfono</label>
            <input type="tel" value="+57 301 456 7890" placeholder="+XX 000 000 0000" class="w-full rounded-xl border-none bg-surface-container-low px-4 py-3 font-medium text-on-background transition-all focus:ring-2 focus:ring-primary/20" />
          </div>

          <div class="space-y-2">
            <label class="block text-[0.65rem] font-bold uppercase tracking-wider text-outline">Empresa</label>
            <input type="text" value="EcoSistemas S.A." placeholder="Nombre de la organización" class="w-full rounded-xl border-none bg-surface-container-low px-4 py-3 font-medium text-on-background transition-all focus:ring-2 focus:ring-primary/20" />
          </div>
        </div>

        <div class="space-y-6">
          <div class="space-y-2">
            <label class="block text-[0.65rem] font-bold uppercase tracking-wider text-outline">Cargo</label>
            <input type="text" value="Directora de Innovación Circular" placeholder="Puesto que desempeña" class="w-full rounded-xl border-none bg-surface-container-low px-4 py-3 font-medium text-on-background transition-all focus:ring-2 focus:ring-primary/20" />
          </div>

          <div class="space-y-2">
            <label class="block text-[0.65rem] font-bold uppercase tracking-wider text-outline">Rol de Usuario</label>
            <div class="group relative">
              <select class="w-full appearance-none rounded-xl border-none bg-surface-container-low px-4 py-3 font-medium text-on-background transition-all focus:ring-2 focus:ring-primary/20 cursor-pointer">
                <option selected>Socio</option>
                <option>Administrador</option>
                <option>Editor</option>
                <option>Lector</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-4 flex items-center">
                <svg class="h-5 w-5 text-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="M6 9l6 6 6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>

            <div class="mt-2 flex items-center gap-2 px-1">
              <svg class="h-[14px] w-[14px] text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="9" stroke-width="2"/>
                <path d="M12 10v5M12 7h.01" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <p class="text-[0.7rem] font-medium text-outline">El cambio aplica en el próximo inicio de sesión</p>
            </div>
          </div>
        </div>
      </form>

      <!-- Footer -->
      <footer class="mt-4 flex items-center justify-between border-t border-outline-variant/10 bg-surface-container-lowest px-10 py-8">
        <button class="text-sm font-bold text-on-surface-variant transition-colors hover:text-on-background">
          Cancelar
        </button>

        <button class="flex items-center gap-3 rounded-full bg-gradient-to-br from-primary to-primary-container px-8 py-4 text-sm font-bold text-white shadow-lg shadow-primary/20 transition-all hover:scale-[1.02] active:scale-[0.98]">
          <svg class="h-5 w-5 text-current" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M17 21H7a2 2 0 01-2-2V7.828a2 2 0 01.586-1.414l2.828-2.828A2 2 0 019.828 3H15a2 2 0 012 2v16z" stroke-width="2" stroke-linejoin="round"/>
            <path d="M9 3v5h6V3M9 14h6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Guardar cambios
        </button>
      </footer>
    </section>
  </div>
</body>
</html>
